<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Preview — Fic Downloader</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; font-size: 14px; background: #1a1a2e; color: #e0d6ff; padding: 24px; }
      h1 { font-size: 15px; color: #c9aff0; margin-bottom: 4px; }
      .url { font-size: 11px; color: #7b6aa0; margin-bottom: 20px; word-break: break-all; }
      section { margin-bottom: 18px; }
      h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #9980cc; margin-bottom: 8px; border-bottom: 1px solid #2e2a4a; padding-bottom: 5px; }
      .override-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
      .override-row > input[type=checkbox] { margin-top: 16px; flex-shrink: 0; }
      .override-row > div { flex: 1; }
      .toggle-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; cursor: pointer; }
      .toggle-row input { width: auto; margin: 0; }
      input[type=text], textarea, select {
        background: #0f0f1e; border: 1px solid #3a3560; border-radius: 4px;
        color: #e0d6ff; padding: 6px 10px; font-size: 13px; width: 100%; font-family: inherit;
        margin-top: 3px;
      }
      textarea { height: 72px; resize: vertical; }
      select { max-width: 280px; }
      input:disabled, textarea:disabled { opacity: 0.35; cursor: not-allowed; }
      input:focus, textarea:focus, select:focus { outline: none; border-color: #7b5ea7; }
      label.field-label { font-size: 12px; color: #9980cc; display: block; }
      label.section-label { font-size: 12px; color: #9980cc; display: block; margin-bottom: 4px; }
      .actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 14px; border-top: 1px solid #2e2a4a; margin-top: 4px; }
      button { cursor: pointer; border: none; border-radius: 4px; font-size: 13px; padding: 8px 20px; }
      .btn-primary { background: #7b5ea7; color: #fff; }
      .btn-primary:hover { background: #9b7ec7; }
      .btn-secondary { background: #2e2a4a; color: #c9aff0; }
      .btn-secondary:hover { background: #3d3860; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
